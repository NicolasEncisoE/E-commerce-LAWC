<div class="card h-100">
  <img src="{{imagen}}" class="card-img-top" alt="{{titulo}}">
  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{titulo}}</h5>
    <p class="card-text fw-bold">$ {{precioUnitario}}</p>
    <button class="btn btn-primary mt-auto" data-id="{{id}}" data-action="addToCart">Agregar al carrito</button>
  </div>
</div>
