<div class="modal fade" id="productoModal" tabindex="-1" aria-labelledby="productoModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded">
      
      <div class="modal-header bg-primary text-white justify-content-center">
        <h5 class="modal-title" id="productoModalLabel">Título del Producto</h5>
        <button type="button" class="btn-close btn-close-white position-absolute end-0 me-2" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      
      <div class="modal-body text-center">
        <img id="productoImagen" src="https://via.placeholder.com/200" alt="Producto" class="img-fluid rounded mb-3" style="max-height: 200px;">
        
        
        <p class="fw-bold text-success fs-5 mb-1">$<span id="productoPrecio">0.00</span></p>
        <h6 class="text-muted mb-2">Details</h6>
        <p id="productoDescripcion" class="text-muted small">Descripción del producto aquí...</p>
        
        <button id="btnAgregarCarrito" type="button" class="btn btn-primary mt-3 w-100">
          <i class="bi bi-cart-plus"></i> Add to cart
        </button>
      </div>
      
    </div>
  </div>
</div>
