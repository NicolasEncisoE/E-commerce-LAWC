<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CND Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"

      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"

    />
    <!-- CND Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <!-- Google fonts Poppins - Roboto -->

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CND Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous" />
  <!-- CND Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <!-- Google fonts Poppins - Roboto -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet" />
  <!-- Importación de estilos CSS -->
  <link rel="stylesheet" href="styles/index.css" />
  <title>Online Shop</title>
</head>

<body>
  <div id="toastContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1100;"></div>

  <header class="header text-bg-primary">
    <!-- Barra de navegación -->
    <nav class="navbar bg-transparent navbar-expand-lg">
      <div class="container-fluid">
        <span class="navbar-brand bg-transparent mb-0 h1 text-bg-primary fs-6 fw-normal">OShop</span>
        <button id="btnToggleCart" class="btn btn-primary bg-transparent border-0" aria-label="Abrir carrito de compras"
          type="button">
          <i class="bi bi-cart2"></i>
        </button>
      </div>
    </nav>
    <!-- Presentación de la marca -->
    <div class="header-content text-center">
      <h1>Online Shop</h1>
      <h3 class="fw-semibold">50% OFF</h3>
    </div>
  </header>
  <!-- Contenido principal -->
  <main class="d-flex flex-column justify-content-between align-items-center">
    <div class="searchbar">
      <i class="bi bi-search search-icon"></i>
      <input type="text" class="form-control search-input" />
    </div>

    <!-- Contenedor para los productos -->
    <div id="productosContainer" class="container my-4">
      <div class="row"></div>
    </div>
  </main>

  <!-- Pie de página -->
  <footer class="text-bg-primary text-center pt-4 d-flex flex-column justify-content-between">
    <h3>Online Shop</h3>
    <div class="d-flex flex-md-row flex-column justify-content-between mx-5">
      <div class="text-start d-flex flex-column justify-content-between gap-3 mb-4 flex-fill">
        <h3 class="mb-2 fw-bold fs-5">Team members</h3>
        <a class="text-white">Nicolás Enciso</a>
        <a class="text-white">Brandon Maciel</a>
      </div>
      <div class="products-container container mt-3 mb-5">
        <div id="product-list" class="row row-cols-2 row-cols-md-4 row-cols-lg-6 justify-content-center mb-5"></div>
        <div id="pagination"></div>
      </div>
    </main>
    <!-- Pie de página -->
    <footer
      class="text-bg-primary text-center pt-4 d-flex flex-column justify-content-between"
    >
      <h3>Online Shop</h3>
      <div class="d-flex flex-md-row flex-column justify-content-between mx-5">
        <div
          class="text-start d-flex flex-column justify-content-between gap-3 mb-4 flex-fill"
        >
          <h3 class="mb-2 fw-bold fs-5">Team members</h3>
          <a class="text-white">Nicolás Enciso</a>
          <a class="text-white">Brandon Maciel</a>
        </div>
      <div class="text-start d-flex flex-column gap-3 mb-4 flex-fill">
        <h3 class="mb-2 fw-bold fs-5">GitHub</h3>
        <a class="text-white">E-commerce-LAWC</a>
      </div>
      <div class="flex-fill d-none d-md-block"></div>
    </div>
    <p>&copy; OShop 2025</p>
  </footer>

  <div id="sideNavContainer"></div>
  <div id="modalContainer"></div>

  <!-- Importación de javascript -->
  <script type="module" src="./scripts/index.js"></script>

  <!-- CND javascript de Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
    crossorigin="anonymous"></script>
  <!-- CND SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
